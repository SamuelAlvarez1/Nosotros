<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samuel y Vale 💕</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Quicksand:wght@300;400;500;600&display=swap"
    rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Alpine.js CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- canvas-confetti CDN -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

  <script>
    /* ─── Tailwind config extendida ─────────────────────────────────── */
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            script: ['"Dancing Script"', 'cursive'],
            sans: ['"Quicksand"', 'sans-serif'],
          },
          colors: {
            rose: {
              blush: '#f9e4e8',
              petal: '#f2c4ce',
              old: '#c08080',
              deep: '#a05060',
            },
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-12px)' },
            },
            floatAlt: {
              '0%, 100%': { transform: 'translateY(0px) rotate(-3deg)' },
              '50%': { transform: 'translateY(-8px) rotate(3deg)' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(40px) scale(0.95)' },
              '100%': { opacity: '1', transform: 'translateY(0)   scale(1)' },
            },
            heartbeat: {
              '0%, 100%': { transform: 'scale(1)' },
              '14%': { transform: 'scale(1.15)' },
              '28%': { transform: 'scale(1)' },
              '42%': { transform: 'scale(1.1)' },
              '70%': { transform: 'scale(1)' },
            },
            drift: {
              '0%': { transform: 'translateY(100vh) rotate(0deg)', opacity: '0' },
              '10%': { opacity: '0.6' },
              '90%': { opacity: '0.3' },
              '100%': { transform: 'translateY(-10vh) rotate(720deg)', opacity: '0' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-200% center' },
              '100%': { backgroundPosition: '200% center' },
            },
            pulseGlow: {
              '0%, 100%': { boxShadow: '0 0 12px 2px rgba(192, 128, 128, 0.3)' },
              '50%': { boxShadow: '0 0 28px 8px rgba(192, 128, 128, 0.6)' },
            },
          },
          animation: {
            'float': 'float 4s ease-in-out infinite',
            'float-alt': 'floatAlt 5s ease-in-out infinite',
            'float-slow': 'float 7s ease-in-out infinite',
            'fade-in-up': 'fadeInUp 0.7s ease-out forwards',
            'heartbeat': 'heartbeat 1.5s ease-in-out infinite',
            'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
          },
        },
      },
    };
  </script>

  <style>
    /* ─── Base ───────────────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      font-family: 'Quicksand', sans-serif;
    }

    body {
      overflow-x: hidden;
      background-color: #fdf6f8;
    }

    /* ─── Scrollbar personalizado ────────────────────────────────────── */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #fdf6f8;
    }

    ::-webkit-scrollbar-thumb {
      background: #f2c4ce;
      border-radius: 10px;
    }

    /* ─── Partículas de fondo (corazones CSS puro) ───────────────────── */
    .particle-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      bottom: -40px;
      font-size: clamp(10px, 2vw, 18px);
      animation: drift linear infinite;
      opacity: 0;
      will-change: transform, opacity;
    }

    /* 20 partículas con posiciones y duraciones variadas */
    .p1 {
      left: 4%;
      animation-duration: 12s;
      animation-delay: 0s;
      font-size: 14px;
    }

    .p2 {
      left: 9%;
      animation-duration: 18s;
      animation-delay: 3s;
      font-size: 10px;
    }

    .p3 {
      left: 15%;
      animation-duration: 14s;
      animation-delay: 1s;
      font-size: 16px;
    }

    .p4 {
      left: 22%;
      animation-duration: 20s;
      animation-delay: 7s;
      font-size: 9px;
    }

    .p5 {
      left: 28%;
      animation-duration: 11s;
      animation-delay: 2s;
      font-size: 18px;
    }

    .p6 {
      left: 34%;
      animation-duration: 16s;
      animation-delay: 5s;
      font-size: 12px;
    }

    .p7 {
      left: 41%;
      animation-duration: 13s;
      animation-delay: 9s;
      font-size: 15px;
    }

    .p8 {
      left: 48%;
      animation-duration: 19s;
      animation-delay: 0.5s;
      font-size: 11px;
    }

    .p9 {
      left: 54%;
      animation-duration: 15s;
      animation-delay: 4s;
      font-size: 17px;
    }

    .p10 {
      left: 61%;
      animation-duration: 10s;
      animation-delay: 6s;
      font-size: 13px;
    }

    .p11 {
      left: 67%;
      animation-duration: 17s;
      animation-delay: 1.5s;
      font-size: 10px;
    }

    .p12 {
      left: 73%;
      animation-duration: 12s;
      animation-delay: 8s;
      font-size: 16px;
    }

    .p13 {
      left: 79%;
      animation-duration: 21s;
      animation-delay: 2.5s;
      font-size: 9px;
    }

    .p14 {
      left: 85%;
      animation-duration: 14s;
      animation-delay: 3.5s;
      font-size: 18px;
    }

    .p15 {
      left: 91%;
      animation-duration: 16s;
      animation-delay: 0s;
      font-size: 12px;
    }

    .p16 {
      left: 7%;
      animation-duration: 22s;
      animation-delay: 6.5s;
      font-size: 14px;
    }

    .p17 {
      left: 19%;
      animation-duration: 13s;
      animation-delay: 4.5s;
      font-size: 16px;
    }

    .p18 {
      left: 37%;
      animation-duration: 18s;
      animation-delay: 1s;
      font-size: 11px;
    }

    .p19 {
      left: 58%;
      animation-duration: 11s;
      animation-delay: 7.5s;
      font-size: 15px;
    }

    .p20 {
      left: 76%;
      animation-duration: 20s;
      animation-delay: 3s;
      font-size: 13px;
    }

    /* ─── Polaroid ───────────────────────────────────────────────────── */
    .polaroid {
      background: #fff;
      padding: 12px 12px 48px 12px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.10), 0 1px 4px rgba(0, 0, 0, 0.07);
      border: 1px solid #f0e0e4;
      display: inline-block;
      transition: transform 0.35s cubic-bezier(.22, 1, .36, 1),
        box-shadow 0.35s ease;
      cursor: pointer;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .polaroid:hover {
      transform: scale(1.05) rotate(0deg) !important;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.15), 0 4px 12px rgba(0, 0, 0, 0.09);
      z-index: 10;
    }

    .polaroid img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      border-radius: 2px;
      transition: opacity 0.3s ease;
    }

    .polaroid.open>img {
      opacity: 0.12;
    }

    .polaroid .caption {
      font-family: 'Dancing Script', cursive;
      font-size: 1.1rem;
      color: #7a5560;
      text-align: center;
      margin-top: 10px;
      line-height: 1.3;
    }

    /* ─── Panel de detalle (aparece al hacer clic) ───────────────────── */
    .polaroid-detail {
      position: absolute;
      inset: 0;
      background: rgba(255, 248, 250, 0.97);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 14px;
      opacity: 0;
      transform: scale(0.93);
      transition: opacity 0.3s ease, transform 0.3s cubic-bezier(.22, 1, .36, 1);
      pointer-events: none;
      border-radius: 2px;
    }

    .polaroid.open .polaroid-detail {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    /* ─── Sticker ────────────────────────────────────────────────────── */
    .sticker img {
      width: 100%;
      object-fit: contain;
      filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.12));
    }

    /* ─── Scroll reveal ──────────────────────────────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(40px) scale(0.96);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* ─── Shimmer text ───────────────────────────────────────────────── */
    .shimmer-text {
      background: linear-gradient(90deg,
          #c08080 0%, #e8a0a0 30%, #c08080 50%, #a05060 70%, #c08080 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }

    /* ─── Separador de corazones ─────────────────────────────────────── */
    .heart-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 2.5rem auto;
      max-width: 340px;
    }

    .heart-divider::before,
    .heart-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, #f2c4ce);
    }

    .heart-divider::after {
      background: linear-gradient(to left, transparent, #f2c4ce);
    }

    /* ─── Modal confetti overlay ─────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(253, 246, 248, 0.92);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeInUp 0.5s ease-out;
    }

    /* ─── Botón Sí ───────────────────────────────────────────────────── */
    .btn-yes {
      background: linear-gradient(135deg, #c08080, #a05060);
      color: white;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      letter-spacing: 0.05em;
      border: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-yes:hover {
      transform: scale(1.07);
      box-shadow: 0 8px 28px rgba(160, 80, 96, 0.4);
    }

    .btn-yes:active {
      transform: scale(0.97);
    }

    /* ─── Botón No ───────────────────────────────────────────────────── */
    .btn-no {
      font-family: 'Quicksand', sans-serif;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid #e0b0b8;
      color: #a07080;
      background: white;
      transition: opacity 0.2s ease;
    }

    .btn-no:active {
      opacity: 0.7;
    }

    /* ─── Timeline vertical ──────────────────────────────────────────── */
    .timeline-dot {
      width: 14px;
      height: 14px;
      background: #c08080;
      border-radius: 50%;
      border: 3px solid #fdf6f8;
      box-shadow: 0 0 0 2px #f2c4ce;
      flex-shrink: 0;
    }
  </style>
</head>

<!-- ═══════════════════════════════════════════════════════════════════
     ALPINE.JS ROOT — todo el estado de la app vive aquí
════════════════════════════════════════════════════════════════════ -->

<body x-data="appData()" x-init="init()" class="min-h-screen bg-[#fdf6f8] font-sans text-gray-800">

  <!-- ── Partículas de fondo ──────────────────────────────────────── -->
  <div class="particle-container" aria-hidden="true">
    <span class="particle p1">♡</span>
    <span class="particle p2">✦</span>
    <span class="particle p3">♡</span>
    <span class="particle p4">✿</span>
    <span class="particle p5">♡</span>
    <span class="particle p6">✦</span>
    <span class="particle p7">♡</span>
    <span class="particle p8">✿</span>
    <span class="particle p9">♡</span>
    <span class="particle p10">✦</span>
    <span class="particle p11">♡</span>
    <span class="particle p12">✿</span>
    <span class="particle p13">♡</span>
    <span class="particle p14">✦</span>
    <span class="particle p15">♡</span>
    <span class="particle p16">♡</span>
    <span class="particle p17">✿</span>
    <span class="particle p18">♡</span>
    <span class="particle p19">✦</span>
    <span class="particle p20">♡</span>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       SECCIÓN 1 — HERO
  ════════════════════════════════════════════════════════════════ -->
  <section class="relative z-10 min-h-screen flex flex-col items-center justify-center text-center px-5 py-20">

    <!-- Frase de apertura -->
    <p class="font-script text-rose-old text-xl md:text-3xl mb-3 opacity-0 animate-fade-in-up"
      style="animation-delay:0.1s; animation-fill-mode:forwards;">
      Colección
    </p>

    <!-- Nombre principal con shimmer -->
    <h1 class="shimmer-text font-script text-7xl p-5 md:text-8xl font-bold leading-tight mb-5
               opacity-0 animate-fade-in-up" style="animation-delay:0.4s; animation-fill-mode:forwards;"
      x-text="nombrePareja">
    </h1>

    <!-- Corazón animado -->
    <div class="text-5xl my-3 opacity-0"
      style="animation: heartbeat 1.5s ease-in-out infinite, fadeInUp 0.7s 0.7s ease-out forwards; animation-fill-mode:forwards;">
      ♡
    </div>

    <!-- Intro text -->
    <p class="font-sans text-gray-600 text-base md:text-xl max-w-sm md:max-w-lg leading-relaxed
              opacity-0 animate-fade-in-up px-2" style="animation-delay:1s; animation-fill-mode:forwards;"
      x-text="introText">
    </p>

    <!-- Indicador scroll — fixed al fondo de la pantalla, siempre centrado -->
    <div class="fixed bottom-8 inset-x-0 flex flex-col items-center gap-1 pointer-events-none
                opacity-0 animate-fade-in-up z-20" style="animation-delay:1.6s; animation-fill-mode:forwards;"
      x-show="!respondio">
      <span class="font-script text-rose-old text-sm drop-shadow-sm">sigue leyendo</span>
      <div class="w-px h-8 bg-gradient-to-b from-rose-300 to-transparent animate-float"></div>
      <span class="text-rose-300 text-base animate-float" style="animation-delay:0.3s">↓</span>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════════
       SECCIÓN 2 — GALERÍA DE RECUERDOS
  ════════════════════════════════════════════════════════════════ -->
  <section class="relative z-10 py-20 px-4 md:px-8 max-w-6xl mx-auto">

    <div class="heart-divider">
      <span class="font-script text-rose-old text-2xl animate-float">♡</span>
    </div>

    <h2 class="font-script text-rose-old text-4xl md:text-5xl text-center mb-4 reveal">
      Nuestros momentos
    </h2>
    <p class="font-sans text-gray-500 text-center mb-16 text-base md:text-lg reveal" style="transition-delay:0.1s">
      Cada foto guarda un pedacito de mi sonrisa favorita.
    </p>

    <!-- Grid: 1 col en móvil, 2 en tablet, 3 en desktop -->
    <div
      class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-8 items-start max-w-sm sm:max-w-none mx-auto">
      <template x-for="(item, index) in recuerdos" :key="index">

        <!-- POLAROID -->
        <div x-show="item.tipo === 'foto'" class="polaroid reveal" :class="[
               item.abierto ? 'open' : '',
               index % 3 === 0 ? 'mt-8' : index % 3 === 1 ? 'mt-0' : 'mt-4'
             ]"
          :style="`transform: rotate(${item.abierto ? 0 : item.rotacion}deg); transition-delay: ${index * 0.08}s`"
          @click="item.abierto = !item.abierto">

          <img :src="item.url" :alt="item.tituloPolaroid" loading="lazy" />

          <!-- Título manuscrito siempre visible -->
          <p class="caption" x-text="item.tituloPolaroid"></p>

          <!-- Panel de detalle — visible al hacer clic -->
          <div class="polaroid-detail">
            <span class="text-xl leading-none text-rose-300">♡</span>
            <p class="font-sans text-gray-700 text-sm text-center leading-snug px-1" x-text="item.descripcion"></p>
            <p class="font-script text-rose-old text-base" x-text="item.fecha"></p>
            <span class="text-gray-300 text-xs mt-1">toca para cerrar</span>
          </div>
        </div>

        <!-- STICKER -->
        <div x-show="item.tipo === 'sticker'" class="sticker reveal flex items-center justify-center p-2"
          :style="`transition-delay: ${index * 0.08}s`" :class="[
               index % 2 === 0 ? 'animate-float' : 'animate-float-alt',
               index % 3 === 0 ? 'mt-6' : 'mt-2'
             ]">
          <img :src="item.url" :alt="item.descripcion" class="w-24 h-24 md:w-32 md:h-32" loading="lazy" />
        </div>

      </template>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════════
       SECCIÓN 3 — TIMELINE DE RAZONES
  ════════════════════════════════════════════════════════════════ -->
  <section class="relative z-10 py-20 px-6 max-w-2xl mx-auto">

    <div class="heart-divider">
      <span class="font-script text-rose-old text-2xl animate-float-slow">✿</span>
    </div>

    <h2 class="font-script text-rose-old text-4xl md:text-5xl text-center mb-16 reveal">
      ¿Por qué tú?
    </h2>

    <div class="relative">
      <!-- Línea vertical -->
      <div class="absolute left-[6px] top-0 bottom-0 w-px bg-gradient-to-b from-rose-200 via-rose-300 to-transparent">
      </div>

      <template x-for="(razon, i) in razones" :key="i">
        <div class="relative flex gap-6 mb-10 reveal" :style="`transition-delay:${i*0.1}s`">
          <div class="timeline-dot mt-1.5"></div>
          <div>
            <p class="font-script text-rose-old text-xl mb-1" x-text="razon.titulo"></p>
            <p class="text-gray-500 text-sm leading-relaxed" x-text="razon.texto"></p>
          </div>
        </div>
      </template>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════════
       SECCIÓN 4 — LA PREGUNTA
  ════════════════════════════════════════════════════════════════ -->
  <section x-show="!respondio" class="relative z-10 py-16 px-6 text-center max-w-xl mx-auto"
    x-transition:leave="transition ease-in duration-300" x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0">

    <div class="heart-divider">
      <span class="font-script text-rose-old text-2xl animate-heartbeat">♡</span>
    </div>

    <h2 class="font-script text-rose-old rounded-3xl text-4xl md:text-6xl mb-3 py-5 reveal animate-pulse-glow"
      style="transition-delay:0.1s" x-text="preguntaFinal">
    </h2>

    

    <!-- Contenedor del botón No — más alto en móvil para que tenga espacio de escapar -->
    <div class="relative w-full h-40 sm:h-28 reveal" style="transition-delay:0.3s">

      <!-- Botón SÍ — centrado fijo -->
      <button @click="aceptar()"
        class="btn-yes absolute px-10 py-4 rounded-full text-xl shadow-lg animate-pulse-glow z-10"
        style="left:50%; top:50%; transform:translate(-50%,-50%)">
        Sí 
      </button>

      <!-- Botón NO — huye del cursor / del tap -->
      <button @mouseenter="escaparNo($event)" @touchstart.prevent="escaparNo($event)"
        class="btn-no absolute px-7 py-3 rounded-full text-base z-20"
        :style="`left: ${noX}px; top: ${noY}px; transform: translate(-50%, -50%);`">
        No
      </button>
    </div>

    <!-- Contador de intentos -->
    <p x-show="intentos > 0" class="mt-8 font-script text-rose-old text-lg md:text-xl animate-fade-in-up" x-transition>
      <span x-text="mensajeIntentos()"></span>
    </p>
  </section>

  <!-- ═══════════════════════════════════════════════════════════════
       MODAL DE ÉXITO
  ════════════════════════════════════════════════════════════════ -->
  <div x-show="respondio" class="modal-overlay" x-transition:enter="transition ease-out duration-500"
    x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100">

    <div class="bg-white rounded-3xl shadow-2xl p-6 md:p-14 max-w-md w-full mx-4 text-center
                border border-rose-100 relative overflow-hidden max-h-[90vh] overflow-y-auto">

      <!-- Destellos decorativos -->
      <div class="absolute top-4 left-4 text-3xl animate-float">♡</div>
      <div class="absolute top-4 right-4 text-3xl animate-float-alt">♡</div>
      <div class="absolute bottom-4 left-8 text-2xl animate-float-slow">♡</div>
      <div class="absolute bottom-4 right-8 text-2xl animate-float" style="animation-delay:1s">♡</div>

      <!-- Foto final -->
      <div class="polaroid mx-auto mb-6 max-w-[220px]" style="transform: rotate(-1deg)">
        <img :src="fotoFinal" alt="Nosotros" />
        <p class="caption">Tu y yo ♡</p>
      </div>

      <div class="text-5xl animate-heartbeat mb-4">❤️</div>

      <h3 class="font-script text-rose-old text-4xl md:text-5xl mb-3" x-text="mensajeAceptacion">
      </h3>

      <p class="text-gray-500 font-sans text-base leading-relaxed mt-2">
        Esta pagina quedará para siempre como un recuerdo nuestro.
      </p>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       SCRIPT ALPINE — lógica completa
  ════════════════════════════════════════════════════════════════ -->
  <script>
    function appData() {
      return {

        respondio: false,

        /* ── INIT ────────────────────────────────────────────────── */
        init() {
          // Posición inicial del botón No: esquina superior derecha del contenedor
          // Se recalcula correctamente en el primer escaparNo()
          this.noX = 50;
          this.noY = 20;

          // Agregar rotaciones aleatorias y estado abierto a los recuerdos
          this.recuerdos = this.recuerdos.map(r => ({
            ...r,
            abierto: false,
            rotacion: r.tipo === 'foto'
              ? (Math.random() * 6 - 3).toFixed(2)
              : 0,
          }));

          // Scroll reveal con IntersectionObserver
          this.$nextTick(() => {
            const observer = new IntersectionObserver((entries) => {
              entries.forEach(entry => {
                if (entry.isIntersecting) {
                  entry.target.classList.add('visible');
                }
              });
            }, { threshold: 0.12 });

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
          });
        },

        /* ── LÓGICA BOTÓN NO ──────────────────────────────────────
           Se mueve a posición aleatoria dentro del contenedor,
           siempre lejos de donde está el botón Sí (centro).
        ─────────────────────────────────────────────────────────── */
        escaparNo(event) {
          this.intentos++;
          const container = event.target.closest('.relative');
          if (!container) return;
          const w = container.offsetWidth || 300;
          const h = container.offsetHeight || 160;
          const padding = 50; // margen mínimo desde los bordes

          // Centro del contenedor (donde está el Sí)
          const cx = w / 2;
          const cy = h / 2;

          let newX, newY, tries = 0;

          do {
            newX = padding + Math.random() * (w - padding * 2);
            newY = padding + Math.random() * (h - padding * 2);
            tries++;
            // Evitar: demasiado cerca del Sí, o demasiado cerca de la posición actual
          } while (
            tries < 20 &&
            (Math.hypot(newX - cx, newY - cy) < 80 ||
              Math.hypot(newX - this.noX, newY - this.noY) < 50)
          );

          this.noX = Math.round(newX);
          this.noY = Math.round(newY);
        },

        /* ── LÓGICA BOTÓN SÍ ────────────────────────────────────── */
        aceptar() {
          this.respondio = true;
          this.$nextTick(() => this.lanzarConfetti());
        },

        /* ── CONFETTI ────────────────────────────────────────────── */
        lanzarConfetti() {
          const colors = ['#f2c4ce', '#c08080', '#fde8ec', '#a05060', '#ffffff', '#f9e4e8'];

          // Dos ráfagas desde las esquinas
          confetti({
            particleCount: 120,
            spread: 80,
            origin: { x: 0.2, y: 0.6 },
            colors,
            shapes: ['circle', 'square'],
            gravity: 0.9,
          });

          setTimeout(() => {
            confetti({
              particleCount: 120,
              spread: 80,
              origin: { x: 0.8, y: 0.6 },
              colors,
              shapes: ['circle', 'square'],
              gravity: 0.9,
            });
          }, 250);

          // Lluvia continua 3 segundos
          const end = Date.now() + 3000;
          const frame = () => {
            confetti({
              particleCount: 5,
              angle: 60,
              spread: 55,
              origin: { x: 0 },
              colors,
            });
            confetti({
              particleCount: 5,
              angle: 120,
              spread: 55,
              origin: { x: 1 },
              colors,
            });
            if (Date.now() < end) requestAnimationFrame(frame);
          };
          frame();
        },

        /* ── MENSAJES DINÁMICOS PARA INTENTOS ─────────────────────
           Cada rango de intentos muestra un mensaje distinto.
        ─────────────────────────────────────────────────────────── */
        mensajeIntentos() {
          if (this.intentos < 3) return 'El botón se movio solo? mas raro.';
          if (this.intentos < 6) return 'Parece que el "No" no quiere que lo elijas';
          if (this.intentos < 10) return 'Intenta presionando el si a ver.';
          if (this.intentos < 15) return 'Perseverancia! pero ya dale al SI';
          return 'Bueno, dele pues al "Si" y ya';
        },
      };
    }
