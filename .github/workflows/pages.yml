name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Copy compiled files to root
        run: |
          cp dist/index.html index.html
          rm -rf assets stickers config.json favicon.svg icons.svg
          cp -r dist/assets .
          cp -r dist/stickers . 2>/dev/null || true
          cp dist/config.json config.json
          cp dist/favicon.svg favicon.svg
          cp dist/icons.svg icons.svg
      
      - name: Commit and push compiled assets
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff-index --quiet HEAD || (git commit -m "deploy: Compiled assets" && git push origin master)
